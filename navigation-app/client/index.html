<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzbechka Navigation | Главная</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
        }

        .hero {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 18px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(255, 204, 0, 0.2);
        }

        .nav-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="hero">
        <h1>UZBECHKA NAV</h1>
        <p>Комплексная система навигации и мониторинга флота</p>

        <div class="card-grid">
            <a href="navigator.html" class="nav-card">
                <span class="icon">🏎️</span>
                <h2>Навигатор</h2>
                <p style="font-size: 14px;">Для водителей и курьеров. GPS ведение и маршруты.</p>
            </a>
            <a href="dashboard.html" class="nav-card">
                <span class="icon">📟</span>
                <h2>Диспетчер</h2>
                <p style="font-size: 14px;">Контроль флота и заказов в реальном времени.</p>
            </a>
        </div>
    </div>
</body>

</html>
